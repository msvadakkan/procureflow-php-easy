<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendor Portal — Procurement System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <style>
    :root { --primary: #22c55e; --primary-d: #16a34a; --primary-l: #f0fdf4; }
    .sidebar { background: linear-gradient(160deg, #14532d 0%, #15803d 100%); }
    .nav-item.active { background: rgba(255,255,255,.2); }
    .topbar-title { color: #15803d; }
    .page-header h2 { color: #15803d; }
    .card-header h3 { color: #15803d; }
    .stat-num { color: #15803d; }
    .btn-primary { background: #22c55e; }
    .btn-primary:hover { background: #16a34a; }
    .form-control:focus { border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,.12); }
    .form-label { color: #15803d; }
    thead th { color: #15803d; background: #dcfce7; border-bottom-color: #bbf7d0; }
    .spinner { border-color: #bbf7d0; border-top-color: #22c55e; }
  </style>
</head>
<body>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/vendor-app.js"></script>
</body>
</html>
